name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_news:
        description: "抓取新闻并生成新日报"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_news_brief:
        description: "从近期已入库新闻强制生成快报（仅用于失败恢复）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install openpyxl

      - name: Generate access config
        run: python tools/sync_access.py

      - name: Generate portal data
        run: python tools/sync_data.py

      - name: Check news database schema
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.refresh_news == 'true' || inputs.force_news_brief == 'true') }}
        env:
          CLOUDBASE_REQUIRED: "1"
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_API_KEY }}
          CLOUDBASE_ACCESS_TOKEN: ${{ secrets.CLOUDBASE_ACCESS_TOKEN }}
          CLOUDBASE_TOKEN: ${{ secrets.CLOUDBASE_TOKEN }}
        run: python tools/sync_news.py --check-cloudbase-schema

      - name: Warm up WeChat collector
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_news == 'true' }}
        continue-on-error: true
        env:
          WECHAT_EXPORTER_BASE_URL: ${{ secrets.WECHAT_EXPORTER_BASE_URL }}
        run: >-
          python tools/warm_wechat_collector.py
          --warmup-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --budget-seconds 120
          --request-timeout-seconds 30

      - name: Generate news data
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.refresh_news == 'true' || inputs.force_news_brief == 'true') }}
        env:
          CLOUDBASE_REQUIRED: "1"
          AI_REQUIRED: "1"
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_API_KEY }}
          CLOUDBASE_ACCESS_TOKEN: ${{ secrets.CLOUDBASE_ACCESS_TOKEN }}
          CLOUDBASE_TOKEN: ${{ secrets.CLOUDBASE_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          WECHAT_EXPORTER_BASE_URL: ${{ secrets.WECHAT_EXPORTER_BASE_URL }}
          WECHAT_COLLECTOR_API_KEY: ${{ secrets.WECHAT_COLLECTOR_API_KEY }}
          FORCE_NEWS_BRIEF: ${{ github.event_name == 'workflow_dispatch' && inputs.force_news_brief || 'false' }}
        run: |
          if [ "$FORCE_NEWS_BRIEF" = "true" ]; then
            python tools/sync_news.py --force-brief-from-recent
          else
            python tools/sync_news.py
          fi

      - name: Prepare Pages artifact
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist/data
          cp index.html pages-dist/
          cp index.html pages-dist/404.html
          cp -r css js vendor pages-dist/
          cp data/access-config.js pages-dist/data/
          cp data/portal-data.js pages-dist/data/
          ACCESS_PATH=$(python -c "import json; print(json.load(open('config/access.json', encoding='utf-8'))['accessPath'].strip('/'))")
          mkdir -p "pages-dist/${ACCESS_PATH}"
          cp index.html "pages-dist/${ACCESS_PATH}/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
